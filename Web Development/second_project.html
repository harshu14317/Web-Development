<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Web Project</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* BODY */

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#dee1e5,#f5f8f8);
min-height:100vh;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
background:rgba(25, 130, 200, 0.787);
backdrop-filter:blur(10px);
color:white;
}

nav ul{
display:flex;
list-style:none;
gap:25px;
}

nav ul li{
cursor:pointer;
transition:0.3s;
}

nav ul li:hover{
color:#f5f4f2;
}

/* MAIN CONTAINER */

.container{
max-width:800px;
margin:40px auto;
padding:20px;
}

/* CARD */

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
margin-bottom:25px;
}

/* HEADINGS */

h2{
margin-bottom:15px;
}

/* FORM */

label{
font-weight:500;
font-size:14px;
}

input, textarea{
width:100%;
padding:12px;
margin:8px 0 15px 0;
border-radius:6px;
border:1px solid #f3eded;
font-family:'Poppins',sans-serif;
}

input:focus, textarea:focus{
outline:none;
border-color:#f3f7f8;
box-shadow:0 0 6px rgba(246, 251, 247, 0.915);
}

/* BUTTON */

button{
background:#ed3b3b;
color:white;
padding:12px 18px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:500;
transition:0.3s;
}

button:hover{
background:#ebedee;
transform:scale(1.05);
}

/* TODO INPUT */

.todo-input{
display:flex;
gap:10px;
margin-bottom:15px;
}

ul{
list-style:none;
}

li{
display:flex;
justify-content:space-between;
align-items:center;
background:#f81212;
padding:10px;
margin:8px 0;
border-radius:6px;
}

.delete-btn{
background:#f9f8f8;
padding:6px 10px;
border-radius:5px;
font-size:12px;
border:none;
color:white;
cursor:pointer;
}

.delete-btn:hover{
background:#ff2e2e;
}

/* SUCCESS MESSAGE */

.success{
color:rgb(243, 244, 243);
margin-top:10px;
font-size:14px;
}

/* RESPONSIVE */

@media(max-width:600px){

nav{
flex-direction:column;
gap:10px;
}

.todo-input{
flex-direction:column;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

<h2>🌐 My Web Project</h2>

<ul>
<li>Home</li>
<li>Projects</li>
<li>Contact</li>
</ul>

</nav>


<!-- MAIN CONTENT -->

<div class="container">

<!-- CONTACT FORM -->

<div class="card">

<h2>Contact Form</h2>

<form id="contactForm">

<label>Name</label>
<input type="text" id="name" placeholder="Enter your name">

<label>Email</label>
<input type="email" id="email" placeholder="Enter your email">

<label>Message</label>
<textarea id="message" rows="4" placeholder="Write your message"></textarea>

<button type="submit">Send Message</button>

<p class="success" id="successMsg"></p>

</form>

</div>


<!-- TODO LIST -->

<div class="card">

<h2>To-Do List</h2>

<div class="todo-input">

<input type="text" id="taskInput" placeholder="Enter a task">

<button onclick="addTask()">Add</button>

</div>

<ul id="taskList"></ul>

</div>

</div>


<script>

/* FORM VALIDATION */

document.getElementById("contactForm").addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let message=document.getElementById("message").value;

let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(name=="" || email=="" || message==""){
alert("Please fill all fields");
return;
}

if(!email.match(emailPattern)){
alert("Enter a valid email");
return;
}

document.getElementById("successMsg").textContent="Message sent successfully!";

});


/* TODO LIST */

function addTask(){

let taskInput=document.getElementById("taskInput");
let taskText=taskInput.value;

if(taskText===""){
alert("Enter a task");
return;
}

let li=document.createElement("li");

li.innerHTML=taskText + ' <button class="delete-btn" onclick="this.parentElement.remove()">Delete</button>';

document.getElementById("taskList").appendChild(li);

taskInput.value="";

}

</script>

</body>
</html>
